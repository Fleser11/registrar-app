<app-search-bar 
    (searchChange)="onSearchChange($event)">
</app-search-bar>
<p></p>
<div class="course-list">
    <ng-container *ngFor="let course of courses; let i = index">
        <app-course-list-item
            [course]="course"
            [searchTerm]="matchesSearch(course)">
        </app-course-list-item>
    </ng-container>
</div>
