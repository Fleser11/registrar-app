
<div *ngFor="let i of range(8)"
class="semesters"
>
    <div class="semester-header">
        <h2>Semester {{i + 1}}</h2>
    </div>
    
    <div *ngFor="let j of range(6)" class="course">
        <app-timeline-slot #timelineSlot
            (resetCourse)="resetCourse($event)"
            (setCourse)="setCourse($event, i, j)"
            (setState)="setState($event, i, j)"
            [course]="currentCourse(i, j)">
        </app-timeline-slot>
    </div>
</div>
